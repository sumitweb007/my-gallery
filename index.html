<!DOCTYPE html>
<html>
<head>
  <title>My Life Gallery</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    /* Upload box */
    .upload-box {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #ff3b3b;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    /* Filter */
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .filters button {
      flex: 1;
      background: #222;
    }

    /* Gallery */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .caption {
      padding: 10px;
      font-size: 14px;
    }

    .category {
      font-size: 12px;
      color: #aaa;
      padding: 0 10px 10px;
    }

  </style>
</head>

<body>

<h1>🌍 My Life Gallery</h1>

<div class="container">

  <!-- Upload Section -->
  <div class="upload-box">
    <input type="file" id="imageInput" accept="image/*">
    
    <input type="text" id="caption" placeholder="Write caption">

    <select id="category">
      <option value="Travel">Travel</option>
      <option value="Birds">Birds</option>
      <option value="School">School</option>
      <option value="Sky">Sky</option>
      <option value="Leaves">Leaves</option>
    </select>

    <button onclick="addPost()">Add to Gallery</button>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button onclick="filter('All')">All</button>
    <button onclick="filter('Travel')">Travel</button>
    <button onclick="filter('Birds')">Birds</button>
    <button onclick="filter('School')">School</button>
    <button onclick="filter('Sky')">Sky</button>
    <button onclick="filter('Leaves')">Leaves</button>
  </div>

  <!-- Gallery -->
  <div class="gallery" id="gallery"></div>

</div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let currentFilter = "All";

function addPost() {
  let file = document.getElementById("imageInput").files[0];
  let caption = document.getElementById("caption").value;
  let category = document.getElementById("category").value;

  if (!file) {
    alert("Select an image");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(e) {
    let post = {
      image: e.target.result,
      caption: caption,
      category: category
    };

    posts.push(post);
    localStorage.setItem("posts", JSON.stringify(posts));

    render();
  };

  reader.readAsDataURL(file);
}

function render() {
  let gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  posts.forEach((p) => {
    if (currentFilter === "All" || p.category === currentFilter) {
      gallery.innerHTML += `
        <div class="card">
          <img src="${p.image}">
          <div class="caption">${p.caption}</div>
          <div class="category">#${p.category}</div>
        </div>
      `;
    }
  });
}

function filter(cat) {
  currentFilter = cat;
  render();
}

render();
</script>

</body>
</html>
